    <style>
        /* ═══════════════════════════════════════════
           Lumina Design System (Gold Accent)
           ═══════════════════════════════════════════ */
        :root {
            --color-primary: #d4af37;
            --color-primary-hover: #c4a032;
            --color-primary-active: #b4912d;
            --color-text-accent: #d4af37;
            --color-background: #0f0f0f;
            --color-surface: #1a1a1a;
            --color-surface-muted: #222222;
            --color-text-primary: #f5f1e8;
            --color-text-muted: #d1d1d1;
            --color-text-subtle: #808080;
            --color-text-inverse: #0f0f0f;
            --color-border: #262626;
            --color-dark-surface: #050505;
            --color-focus-ring: rgba(212, 175, 55, 0.35);
            --color-danger: #e06060;
            --color-success: #d4af37;

            --color-hover-bg: rgba(255, 255, 255, 0.05);
            --color-hover-bg-strong: rgba(255, 255, 255, 0.08);
            --color-overlay-bg: rgba(0, 0, 0, 0.7);
            --color-active-bg: rgba(212, 175, 55, 0.1);
            --color-pulse-glow: rgba(212, 175, 55, 0.15);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;

            --elevation-card: 0 8px 24px rgba(0, 0, 0, 0.3);
            --elevation-card-hover: 0 12px 36px rgba(0, 0, 0, 0.4);

            --font-sans: 'Satoshi', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
            --font-display: 'Cabinet Grotesk', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
        }

        :root.light-theme {
            --color-primary: #d4af37;
            --color-primary-hover: #c4a032;
            --color-primary-active: #b4912d;
            --color-text-accent: #b4912d;
            --color-background: #f8f6f2;
            --color-surface: #ffffff;
            --color-surface-muted: #f0eee8;
            --color-text-primary: #1a1a1a;
            --color-text-muted: #666666;
            --color-text-subtle: #999999;
            --color-text-inverse: #ffffff;
            --color-border: #e0ddd6;
            --color-dark-surface: #0f0f0f;
            --color-focus-ring: rgba(212, 175, 55, 0.3);
            --color-danger: #c04a4a;
            --color-success: #d4af37;

            --color-hover-bg: rgba(0, 0, 0, 0.04);
            --color-hover-bg-strong: rgba(0, 0, 0, 0.06);
            --color-overlay-bg: rgba(0, 0, 0, 0.5);
            --color-active-bg: rgba(212, 175, 55, 0.08);
            --color-pulse-glow: rgba(212, 175, 55, 0.12);

            --elevation-card: 0 2px 8px rgba(0, 0, 0, 0.06);
            --elevation-card-hover: 0 4px 16px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; }

        ::selection {
            background: var(--color-primary);
            color: white;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--color-text-subtle); }

        body {
            margin: 0; padding: 0;
            font-family: var(--font-sans);
            background: var(--color-background);
            color: var(--color-text-primary);
            height: 100vh; overflow: hidden;
            font-size: 16px;
            line-height: 1.5;
        }

        /* ── Noise Texture Overlay ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            opacity: 0.035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ── Auth Geometric Pattern ── */
        .auth-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.02) 0%, transparent 40%);
            pointer-events: none;
        }

        .auth-overlay::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(45deg, var(--color-border) 1px, transparent 1px),
                linear-gradient(-45deg, var(--color-border) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.06;
            pointer-events: none;
        }

        /* ── App Container ── */
        .app-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
            position: relative;
            animation: fadeSlideUp 0.4s ease;
        }

        /* ── Auth Overlay (Dark Hero) ── */
        .auth-overlay {
            display: flex;
            position: fixed; inset: 0;
            background: var(--color-dark-surface);
            z-index: 2000;
            align-items: center; justify-content: center;
        }
        .auth-overlay.hidden { display: none; }

        .auth-card {
            background: #1a1a1a;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 36px 32px 32px;
            width: 380px;
            max-width: 90vw;
            box-shadow: var(--elevation-card-hover);
            animation: modalScaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        :root.light-theme .auth-card {
            background: #ffffff;
            border: 1px solid var(--color-border);
        }

        .auth-brand {
            width: 44px; height: 44px;
            background: var(--color-primary);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center; justify-content: center;
            font-size: 20px;
            color: white;
            margin: 0 auto 20px auto;
            font-weight: 500;
            overflow: hidden;
        }
        .auth-brand-img {
            width: 24px;
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .auth-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.01em;
            color: var(--color-text-primary);
            font-family: var(--font-display);
        }

        .auth-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--color-text-muted);
            margin: 0 0 28px 0;
        }

        .auth-form { display: flex; flex-direction: column; gap: 12px; }

        .auth-form input {
            width: 100%;
            padding: 8px 12px;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            font-size: 16px;
            font-family: var(--font-sans);
            line-height: 1.5;
            outline: none;
            transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #c4a032;
            box-shadow: rgba(212, 175, 55, 0.5) 0px 0px 0px 1px inset, var(--color-focus-ring) 0px 0px 0px 2px;
        }

        .auth-form input::placeholder {
            color: var(--color-text-subtle);
        }

        .auth-submit-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            background: var(--color-primary);
            color: white;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-sans);
            transition: background-color 0.2s ease-out;
            width: 100%;
            margin-top: 4px;
        }

        .auth-submit-btn:hover { background: var(--color-primary-hover); }
        .auth-submit-btn:active { background: var(--color-primary-active); }
        .auth-submit-btn:disabled { background: var(--color-surface-muted); color: var(--color-text-subtle); cursor: not-allowed; }

        .auth-toggle {
            text-align: center;
            font-size: 14px;
            color: var(--color-text-muted);
            margin: 20px 0 0 0;
        }

        .auth-toggle a {
            color: var(--color-text-accent);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        .auth-toggle a:hover {
            text-decoration: underline;
            text-decoration-color: var(--color-text-accent);
        }

        .auth-error {
            color: var(--color-danger);
            font-size: 14px;
            text-align: center;
            margin: 12px 0 0 0;
            display: none;
        }
        .auth-error.visible { display: block; }

        .auth-success-msg {
            text-align: center;
            font-size: 14px;
            color: var(--color-primary);
            margin: 12px 0 0 0;
            display: none;
        }
        .auth-success-msg.visible { display: block; }

        /* ── Sidebar ── */
        .left-panels {
            display: flex;
            width: 300px;
            min-width: 180px;
            max-width: 500px;
            flex-shrink: 0;
            z-index: 10;
            background: var(--color-surface);
            border-right: 1px solid var(--color-border);
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease, width 0s;
        }

        .app-container.resizing .left-panels {
            transition: none;
            user-select: none;
        }

        .app-container.sidebar-hidden .left-panels {
            margin-left: calc(-300px - 4px);
            opacity: 0;
        }

        .resize-handle {
            position: absolute;
            top: 0;
            right: -2px;
            width: 4px;
            height: 100%;
            cursor: col-resize;
            z-index: 20;
            background: transparent;
            transition: background 0.15s;
        }

        .resize-handle:hover,
        .resize-handle.active {
            background: var(--color-primary);
        }

        .notes-panel {
            width: 100%;
            display: flex; flex-direction: column;
        }

        .brand-container {
            padding: 20px 20px 16px 20px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
        }

        .brand-container::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(90deg, var(--color-primary), transparent 80%);
            opacity: 0.4;
        }

        .brand-icon {
            width: 28px;
            height: 28px;
            background: var(--color-primary);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #0f0f0f;
            flex-shrink: 0;
            font-weight: 700;
            font-family: var(--font-display);
            box-shadow: 0 0 16px rgba(212, 175, 55, 0.25);
        }
        .brand-icon-img {
            width: 16px;
            height: 16px;
            filter: brightness(0);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .brand-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0;
            color: var(--color-text-primary);
            font-family: var(--font-display);
            letter-spacing: -0.01em;
        }

        .brand-sub {
            font-size: 12px;
            font-weight: 400;
            color: var(--color-text-muted);
            margin-top: 0px;
        }

        .notes-header {
            padding: 12px 16px 8px 16px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .notes-header h2 {
            margin: 0;
            font-size: 11px;
            font-weight: 500;
            color: var(--color-text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .header-actions { display: flex; gap: 6px; }

        /* ── Button System ── */
        .btn-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 6px 12px;
            background: transparent;
            color: var(--color-text-muted);
            font-size: 14px;
            font-weight: 400;
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-sans);
            transition: background-color 0.2s ease-out, color 0.2s ease-out;
        }

        .btn-action:hover {
            background: var(--color-hover-bg);
            color: var(--color-text-primary);
        }

        .btn-action:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-action.primary {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #0f0f0f;
            font-weight: 500;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            transition: background-color 0.2s ease-out, box-shadow 0.2s ease-out, transform 0.12s;
        }

        .btn-action.primary:active {
            transform: scale(0.97);
        }

        :root.light-theme .btn-action.primary {
            color: white;
            box-shadow: none;
        }

        .btn-action.primary:hover {
            background: var(--color-primary-hover);
            border-color: var(--color-primary-hover);
        }

        .btn-action.primary:active {
            background: var(--color-primary-active);
        }

        .btn-action.primary:disabled {
            background: var(--color-surface-muted);
            border-color: var(--color-surface-muted);
            color: var(--color-text-subtle);
            cursor: not-allowed;
        }

        /* ── Search Bar ── */
        .search-bar {
            margin: 4px 16px;
            display: flex;
            align-items: center;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 0 10px;
            transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
        }

        .search-bar:focus-within {
            outline: none;
            border-color: #c4a032;
            box-shadow: rgba(212, 175, 55, 0.5) 0px 0px 0px 1px inset, var(--color-focus-ring) 0px 0px 0px 2px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--color-text-primary);
            font-size: 14px;
            padding: 6px 6px;
            width: 100%;
            font-family: var(--font-sans);
            line-height: 1.5;
        }

        .search-bar input::placeholder {
            color: var(--color-text-subtle);
        }

        .search-bar-icon {
            color: var(--color-text-subtle);
            font-size: 12px;
            flex-shrink: 0;
        }

        /* ── Notes List / Tree ── */
        .notes-list {
            flex-grow: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 4px 0;
            position: relative;
            min-height: 100px;
        }

        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 24px; text-align: center;
            color: var(--color-text-muted); font-size: 14px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 14px;
            opacity: 0.2;
            line-height: 1;
            font-weight: 300;
        }
        .empty-state-icon-img {
            width: 32px;
            height: 32px;
            opacity: 0.2;
            vertical-align: middle;
        }

        .empty-state-text { line-height: 1.65; max-width: 220px; color: var(--color-text-subtle); }
        .empty-state-text strong { color: var(--color-text-muted); font-weight: 500; }

        .loading-skeleton { padding: 12px 20px; }

        .loading-skeleton-line {
            height: 10px;
            background: var(--color-border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            animation: shimmer 1.5s ease-in-out infinite;
        }

        .loading-skeleton-line:nth-child(2) { width: 70%; }
        .loading-skeleton-line:nth-child(3) { width: 85%; }
        .loading-skeleton-line:nth-child(4) { width: 55%; }
        .loading-skeleton-line:nth-child(5) { width: 75%; }

        @keyframes shimmer {
            0% { opacity: 0.5; }
            50% { opacity: 0.9; }
            100% { opacity: 0.5; }
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(212, 175, 55, 0.1); }
            50% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        }

        /* ── Tree Items ── */
        .tree-item {
            display: flex;
            align-items: center;
            padding: 6px 12px 6px 16px;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            transition: background 0.12s, transform 0.15s, border-color 0.15s;
            position: relative;
            border-left: 2px solid transparent;
            animation: fadeSlideIn 0.3s ease both;
        }

        .tree-item:hover {
            background: var(--color-hover-bg);
            transform: translateX(3px);
        }

        .tree-item.active {
            background: var(--color-active-bg);
            border-left-color: var(--color-primary);
        }

        .tree-item.active::after {
            content: '';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--color-primary);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.4);
        }

        .tree-item-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
            min-width: 0;
        }

        .tree-item-icon {
            flex-shrink: 0;
            font-size: 10px;
            line-height: 1;
            color: var(--color-text-muted);
            width: 18px;
            text-align: center;
            opacity: 0.7;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tree-item-icon svg {
            display: block;
        }

        .tree-item:hover .tree-item-icon {
            opacity: 1;
        }

        .tree-item.active .tree-item-icon {
            color: var(--color-primary);
            opacity: 1;
        }

        .tree-item-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .tree-item-title {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 400;
            font-size: 14px;
            cursor: default;
            line-height: 1.4;
        }

        .tree-item-title-edit {
            width: 100%;
            background: var(--color-background);
            border: 1px solid var(--color-primary);
            border-radius: var(--radius-sm);
            padding: 2px 6px;
            font-size: 14px;
            font-weight: 400;
            color: var(--color-text-primary);
            outline: none;
            font-family: var(--font-sans);
        }

        .tree-item-preview {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 0px;
        }

        .inline-actions {
            display: none;
            gap: 2px;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .tree-item:hover .inline-actions { display: flex; }

        .btn-inline {
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            font-size: 12px;
            padding: 3px 5px;
            border-radius: var(--radius-sm);
            transition: all 0.15s;
            line-height: 1;
            opacity: 0.6;
        }

        .btn-inline:hover {
            color: var(--color-text-primary);
            background: var(--color-hover-bg);
            opacity: 1;
        }

        .btn-inline[title="Delete"]:hover {
            color: var(--color-danger);
            background: rgba(224, 96, 96, 0.1);
        }

        .sub-tree { display: none; overflow: hidden; }
        .sub-tree.expanded { display: block; }

        .notes-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .footer-right-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ── Editor ── */
        .editor-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            background: var(--color-background);
            min-width: 0;
            position: relative;
        }

        .editor-topbar {
            padding: 8px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--color-border);
            background: var(--color-surface);
            min-height: 44px;
        }

        .editor-status {
            color: var(--color-text-muted);
            font-size: 12px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .editor-status.saving { color: var(--color-primary); }
        .editor-status.unsaved { color: var(--color-text-muted); }
        .editor-status.failed { color: var(--color-danger); }

        .floating-reveal-btn {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--color-background);
            border: 1px solid var(--color-border);
            color: var(--color-text-muted);
            border-radius: var(--radius-md);
            padding: 0 16px;
            height: 38px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            z-index: 50;
            box-shadow: var(--elevation-card-hover);
            transition: all 0.2s;
            white-space: nowrap;
            font-family: var(--font-sans);
            font-weight: 400;
            backdrop-filter: blur(8px);
        }

        .app-container.sidebar-hidden .floating-reveal-btn {
            display: flex;
            animation: revealPulse 2s ease-in-out infinite;
        }

        @keyframes revealPulse {
            0%, 100% { box-shadow: var(--elevation-card-hover); }
            50% { box-shadow: var(--elevation-card-hover), 0 0 24px var(--color-pulse-glow); }
        }

        .floating-reveal-btn:hover {
            color: var(--color-text-primary);
            border-color: var(--color-primary);
            transform: translateX(-50%) scale(1.03);
            animation: none;
        }

        .icon-btn-action {
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            font-size: 14px;
            cursor: pointer;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all 0.12s;
            font-family: var(--font-sans);
        }

        .icon-btn-action:hover {
            color: var(--color-text-primary);
            background: var(--color-hover-bg);
        }

        .editor-content-area {
            padding: 48px 80px;
            flex-grow: 1;
            overflow-y: auto;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            background: var(--color-background);
            min-height: 0;
        }

        /* ── Quill Toolbar ── */
        .ql-toolbar.ql-snow {
            border: none;
            border-bottom: 1px solid var(--color-border);
            padding: 3px 10px;
            background: var(--color-surface);
            display: flex;
            flex-wrap: wrap;
            gap: 0;
        }

        .ql-toolbar.ql-snow .ql-formats {
            display: flex;
            align-items: center;
            margin-right: 0;
            padding: 0 6px;
            border-right: 1px solid var(--color-border);
        }

        .ql-toolbar.ql-snow .ql-formats:last-child { border-right: none; }

        .ql-toolbar.ql-snow button {
            width: 28px;
            height: 28px;
            padding: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all 0.1s;
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--color-text-muted);
        }

        .ql-toolbar.ql-snow button:hover {
            background: var(--color-hover-bg);
        }

        .ql-toolbar.ql-snow button.ql-active {
            background: var(--color-active-bg);
        }

        .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: var(--color-primary); }
        .ql-toolbar.ql-snow button.ql-active .ql-fill { fill: var(--color-primary); }

        .ql-toolbar.ql-snow .custom-toolbar-btn {
            width: 28px;
            height: 28px;
            padding: 3px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            transition: all 0.1s;
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-sans);
        }

        .ql-toolbar.ql-snow .custom-toolbar-btn:hover {
            background: var(--color-hover-bg);
            color: var(--color-text-primary);
        }

        .ql-toolbar.ql-snow #size-decrease-btn,
        .ql-toolbar.ql-snow #size-increase-btn {
            font-weight: 550;
            letter-spacing: -0.5px;
        }

        .ql-toolbar.ql-snow .ql-picker {
            height: 28px;
            display: inline-flex;
            align-items: center;
        }

        .ql-toolbar.ql-snow .ql-picker-label {
            border: 1px solid transparent;
            padding: 1px 6px;
            border-radius: var(--radius-sm);
            font-size: 12px;
        }

        .ql-toolbar.ql-snow .ql-picker-label:hover {
            border-color: var(--color-border);
        }

        .ql-toolbar.ql-snow .ql-picker-options {
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: var(--elevation-card-hover);
            padding: 4px;
            margin-top: 2px;
        }

        .ql-toolbar.ql-snow .ql-picker-options .ql-picker-item {
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            font-size: 14px;
        }

        .ql-toolbar.ql-snow .ql-picker-options .ql-picker-item:hover {
            background: var(--color-hover-bg);
        }

        .ql-container.ql-snow { border: none; }

        .ql-editor {
            padding: 0;
            min-height: 400px;
            height: 100%;
            color: var(--color-text-primary);
            line-height: 1.5;
            font-size: 16px;
            font-family: var(--font-sans);
        }

        .ql-editor.ql-blank::before {
            color: var(--color-text-subtle);
            font-style: normal;
            left: 0;
        }

        .ql-editor table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
            border: 1px solid var(--color-border);
        }

        .ql-editor td {
            border: 1px solid var(--color-border);
            padding: 8px 12px;
            min-width: 40px;
        }

        .ql-snow .ql-stroke { stroke: var(--color-text-muted); }
        .ql-snow .ql-fill { fill: var(--color-text-muted); }
        .ql-snow .ql-picker { color: var(--color-text-muted); }
        .ql-snow .ql-active .ql-stroke { stroke: var(--color-primary); }
        .ql-snow .ql-active .ql-fill { fill: var(--color-primary); }
        .ql-snow .ql-picker-label.ql-active { color: var(--color-primary); }
        .ql-snow .ql-picker-label.ql-active .ql-stroke { stroke: var(--color-primary); }

        .ql-snow .ql-editor h1 {
            font-size: 40px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            font-family: var(--font-display);
        }

        .ql-snow .ql-editor h2 {
            font-size: 24px;
            font-weight: 600;
            line-height: 1.3;
            letter-spacing: -0.01em;
            font-family: var(--font-display);
        }

        .ql-snow .ql-editor h3 {
            font-size: 20px;
            font-weight: 500;
            line-height: 1.4;
            letter-spacing: -0.01em;
            font-family: var(--font-display);
        }

        /* ── Table Grid Popup ── */
        .table-grid-popup {
            display: none;
            position: fixed;
            z-index: 100;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            box-shadow: var(--elevation-card-hover);
            padding: 12px;
        }

        .table-grid-popup.open { display: block; }

        .table-grid-label {
            font-size: 12px;
            font-weight: 400;
            color: var(--color-text-muted);
            text-align: center;
            margin-bottom: 8px;
        }

        .table-grid { display: grid; gap: 2px; }

        .table-grid-cell {
            width: 16px;
            height: 16px;
            background: var(--color-border);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.08s;
        }

        .table-grid-cell.selected {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }

        .table-grid-cell:hover {
            background: var(--color-primary);
            border-color: var(--color-primary);
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: var(--color-overlay-bg);
            z-index: 1000;
            align-items: center; justify-content: center;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.open { display: flex; }

        .modal-overlay.open .modal {
            animation: modalScaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalScaleIn {
            from { transform: scale(0.92) translateY(8px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal {
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            padding: 28px;
            width: 380px;
            max-width: 90vw;
            box-shadow: var(--elevation-card-hover);
        }

        .modal h3 {
            margin: 0 0 18px 0;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: var(--color-text-primary);
        }

        .modal-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .modal-input {
            width: 100%;
            padding: 8px 12px;
            background: var(--color-background);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            font-size: 16px;
            font-family: var(--font-sans);
            line-height: 1.5;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
        }

        .modal-input:focus {
            outline: none;
            border-color: #c4a032;
            box-shadow: rgba(212, 175, 55, 0.5) 0px 0px 0px 1px inset, var(--color-focus-ring) 0px 0px 0px 2px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-actions .btn-action {
            padding: 7px 16px;
            font-size: 14px;
        }

        /* ── Toast ── */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            padding: 10px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--elevation-card-hover);
            animation: toastIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
            max-width: 300px;
        }

        .toast.toast-out {
            animation: toastOut 0.2s ease forwards;
        }

        .toast-error {
            background: var(--color-danger);
            color: white;
        }

        .toast-success {
            background: var(--color-primary);
            color: white;
        }

        @keyframes toastIn {
            from { transform: translateY(8px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes toastOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-4px); opacity: 0; }
        }
    </style>
</head>

                        <option value="#f2f3f4" label="Gray"></option>
                    </select>
                </span>
                <span class="ql-formats">
                    <select class="ql-header">
                        <option value="false">Normal</option>
                        <option value="1">Heading 1</option>
                        <option value="2">Heading 2</option>
                        <option value="3">Heading 3</option>

                    <button class="ql-list" value="ordered" title="Numbered List"></button>
                    <button class="ql-list" value="bullet" title="Bulleted List"></button>

                    <button class="ql-align" value="" title="Align Left"></button>
                    <button class="ql-align" value="center" title="Align Center"></button>

                <span class="ql-formats">
                    <button class="ql-link" title="Link"></button>

            <!-- Table grid popup -->
            <div class="table-grid-popup" id="tableGridPopup">

    <!-- Modal for Create / Table -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">Create</h3>
            <label class="modal-label" id="modalInputLabel">Title</label>
            <input class="modal-input" id="modalInput" type="text" placeholder="Enter title" autofocus>
            <div id="modalExtraFields"></div>
            <div class="modal-actions">
                <button class="btn-action" id="modalCancelBtn" type="button">Cancel</button>
                <button class="btn-action primary" id="modalConfirmBtn" type="button">Create</button>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // ── Toast system ──
        function showToast(message, type) {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = 'toast toast-' + type;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => {
                el.classList.add('toast-out');
                setTimeout(() => el.remove(), 200);
            }, 2800);
        }

        // ── Auth state ──
        let currentUser = null;

        function getAuthToken() { return localStorage.getItem('auth_token'); }
        function setAuthToken(token) { if (token) localStorage.setItem('auth_token', token); else localStorage.removeItem('auth_token'); }
        function setAuthUser(user) { if (user) localStorage.setItem('auth_user', JSON.stringify(user)); else localStorage.removeItem('auth_user'); }
        function getStoredUser() {
            const raw = localStorage.getItem('auth_user');
            return raw ? JSON.parse(raw) : null;
        }

        // ── Authenticated fetch wrapper ──
        async function api(path, options = {}) {
            const token = getAuthToken();
            const headers = options.headers || {};
            if (token) {
                headers['Authorization'] = 'Bearer ' + token;
            }
            if (options.body && typeof options.body === 'string') {
                headers['Content-Type'] = 'application/json';
            }
            const response = await fetch(path, { ...options, headers });

            if (response.status === 401 && path !== '/api/auth/login' && path !== '/api/auth/signup') {
                setAuthToken(null);
                setAuthUser(null);
                currentUser = null;
                showAuthScreen();
                throw new Error('Session expired. Please log in again.');
            }
            return response;
        }

        // ── Auth functions ──
        let authMode = 'login';

        function showAuthScreen() {
            document.getElementById('authOverlay').classList.remove('hidden');
            document.getElementById('appMainWrapper').style.display = 'none';
        }

        function hideAuthScreen() {
            document.getElementById('authOverlay').classList.add('hidden');
            document.getElementById('appMainWrapper').style.display = 'flex';
        }

        function setAuthError(msg) {
            const el = document.getElementById('authError');
            el.textContent = msg || '';
            el.classList.toggle('visible', !!msg);
        }

        function setAuthSuccess(msg) {
            const el = document.getElementById('authSuccessMsg');
            el.textContent = msg || '';
            el.classList.toggle('visible', !!msg);
        }

        function toggleAuthMode() {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('authSubtitle').textContent =
                authMode === 'login' ? 'Sign in to your account' : 'Create a new account';
            document.getElementById('authSubmitBtn').textContent =
                authMode === 'login' ? 'Sign In' : 'Create Account';
            document.getElementById('authToggleText').textContent =
                authMode === 'login' ? "Don't have an account?" : 'Already have an account?';
            document.getElementById('authToggleLink').textContent =
                authMode === 'login' ? 'Sign Up' : 'Sign In';
            setAuthError(null);
            setAuthSuccess(null);
        }

        async function handleAuthSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value;
            const btn = document.getElementById('authSubmitBtn');

            setAuthError(null);
            setAuthSuccess(null);

            if (!email || !password) {
                setAuthError('Please fill in all fields');
                return;
            }

            btn.disabled = true;
            btn.textContent = authMode === 'login' ? 'Signing in...' : 'Creating account...';

            try {
                const endpoint = authMode === 'login' ? '/api/auth/login' : '/api/auth/signup';
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong');
                }

                if (authMode === 'signup') {
                    if (data.session) {
                        // Auto-signed in (email confirmation disabled)
                        setAuthToken(data.session.access_token);
                        setAuthUser(data.user);
                        currentUser = data.user;
                        hideAuthScreen();
                        initApp();
                    } else {
                        // Email confirmation required
                        setAuthSuccess('Account created! Check your email to confirm.');
                        document.getElementById('authPassword').value = '';
                        toggleAuthMode();
                    }
                    return;
                }

                // Login
                setAuthToken(data.session.access_token);
                setAuthUser(data.user);
                currentUser = data.user;
                hideAuthScreen();
                initApp();
            } catch (err) {
                setAuthError(err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = authMode === 'login' ? 'Sign In' : 'Create Account';
            }
        }

        async function checkAuth() {
            const token = getAuthToken();
            if (!token) {
                showAuthScreen();
                return false;
            }

            try {
                const response = await api('/api/auth/me');
                if (!response.ok) throw new Error('Invalid session');
                const data = await response.json();
                currentUser = data.user;
                hideAuthScreen();
                return true;
            } catch (err) {
                setAuthToken(null);
                setAuthUser(null);
                currentUser = null;
                showAuthScreen();
                return false;
            }
        }

        async function handleLogout() {
            try {
                await api('/api/auth/logout', { method: 'POST' });
            } catch (err) { /* ignore */ }
            setAuthToken(null);
            setAuthUser(null);
            currentUser = null;
            currentNoteId = null;
            hasUnsavedChanges = false;
            allItems = [];
            document.getElementById('treeRootContainer').innerHTML = '';
            quill.root.innerHTML = '';
            showAuthScreen();
        }

        // ── Bind auth events ──
        document.getElementById('authForm').addEventListener('submit', handleAuthSubmit);
        document.getElementById('authToggleLink').addEventListener('click', (e) => {
            e.preventDefault();
            toggleAuthMode();
        });

        // ── Modal system ──
        let modalResolve = null;
        let modalBusy = false;

        function openModal(config) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('modalOverlay');
                document.getElementById('modalTitle').textContent = config.title;
                document.getElementById('modalInputLabel').textContent = config.label || 'Title';
                document.getElementById('modalInput').value = config.initialValue || '';
                document.getElementById('modalInput').placeholder = config.placeholder || 'Enter value';
                document.getElementById('modalConfirmBtn').textContent = config.confirmText || 'Create';
                document.getElementById('modalExtraFields').innerHTML = config.extraFields || '';

                modalResolve = resolve;
                overlay.classList.add('open');
                modalBusy = false;
                setTimeout(() => document.getElementById('modalInput').focus(), 50);
            });
        }

        function dismissModal(value) {
            if (modalBusy) return;
            modalBusy = true;
            document.getElementById('modalOverlay').classList.remove('open');
            if (modalResolve) modalResolve(value);
            modalResolve = null;
        }

        document.getElementById('modalInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                e.stopPropagation();
                dismissModal(e.target.value);
            }
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();
                dismissModal(null);
            }
        });

        document.getElementById('modalConfirmBtn').addEventListener('click', () => {
            dismissModal(document.getElementById('modalInput').value);
        });
        document.getElementById('modalCancelBtn').addEventListener('click', () => {
            dismissModal(null);
        });
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) dismissModal(null);
        });

        // ── Quill setup (with custom table blot + font sizes) ──
        (function registerTableBlot() {
            const BlockEmbed = Quill.import('blots/block/embed');
            class TableBlot extends BlockEmbed {
                static blotName = 'table';
                static tagName = 'table';
                static create(value) {
                    const node = super.create(value);
                    node.style.cssText = 'border-collapse:collapse;width:100%;margin:15px 0;border:1px solid #a1a1aa;';
                    if (value) node.innerHTML = value;
                    return node;
                }
                static value(node) {
                    return node.innerHTML;
                }
            }
            Quill.register(TableBlot);
        })();

        (function registerFontSizes() {
            const SizeStyle = Quill.import('attributors/style/size');
            SizeStyle.whitelist = ['11px', '12px', '13px', '14px', '16px', '18px', '20px', '24px', '28px', '32px', '36px'];
            Quill.register(SizeStyle, true);
        })();

        const FONT_SIZES = ['11px', '12px', '13px', '14px', '16px', '18px', '20px', '24px', '28px', '32px', '36px'];

        const quill = new Quill('#editor-container', {
            theme: 'snow',
            modules: { toolbar: '#toolbar-container' }
        });

        // ── Font size increase/decrease ──
        function changeFontSize(direction) {
            const range = quill.getSelection(true);
            if (!range) return;
            const currentSize = quill.getFormat(range).size || '16px';
            const idx = FONT_SIZES.indexOf(currentSize);
            const nextIdx = Math.min(Math.max(idx + direction, 0), FONT_SIZES.length - 1);
            if (nextIdx === idx) return;
            quill.format('size', FONT_SIZES[nextIdx]);
        }
        document.getElementById('size-decrease-btn').addEventListener('click', () => changeFontSize(-1));
        document.getElementById('size-increase-btn').addEventListener('click', () => changeFontSize(1));

        // ── Table grid popup (Google Docs style) ──
        const GRID_MAX = 8;
        const tableGridPopup = document.getElementById('tableGridPopup');
        const tableGridEl = document.getElementById('tableGrid');
        const tableGridLabel = document.getElementById('tableGridLabel');
        let selectedRows = 1, selectedCols = 1;

        function buildTableGrid(rows, cols) {
            tableGridEl.style.gridTemplateColumns = 'repeat(' + cols + ', 16px)';
            tableGridEl.innerHTML = '';
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'table-grid-cell' + (r < selectedRows && c < selectedCols ? ' selected' : '');
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    tableGridEl.appendChild(cell);
                }
            }
        }

        function updateTableGridHover(r, c) {
            const cells = tableGridEl.querySelectorAll('.table-grid-cell');
            cells.forEach(cell => {
                const cr = parseInt(cell.dataset.r);
                const cc = parseInt(cell.dataset.c);
                cell.classList.toggle('selected', cr <= r && cc <= c);
            });
            tableGridLabel.textContent = (r + 1) + ' \u00d7 ' + (c + 1);
            selectedRows = r + 1;
            selectedCols = c + 1;
        }

        function insertTableAtCursor(numRows, numCols) {
            const range = quill.getSelection(true);
            if (!range) return;

            let html = '';
            for (let i = 0; i < numRows; i++) {
                html += '<tr>';
                for (let j = 0; j < numCols; j++) {
                    html += '<td style="border:1px solid #a1a1aa;padding:6px 10px;min-width:40px;"><br></td>';
                }
                html += '</tr>';
            }

            const tableHtml = '<tbody>' + html + '</tbody>';
            quill.insertEmbed(range.index, 'table', tableHtml);
            quill.setSelection(range.index + 1, 0);
            quill.format('table', false);
        }

        const tableBtn = document.getElementById('custom-table-btn');
        tableBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const rect = tableBtn.getBoundingClientRect();
            selectedRows = 1;
            selectedCols = 1;
            buildTableGrid(GRID_MAX, GRID_MAX);
            tableGridLabel.textContent = '1 \u00d7 1';
            let left = rect.left;
            const popupWidth = GRID_MAX * 16 + (GRID_MAX - 1) * 2 + 24;
            if (left + popupWidth > window.innerWidth - 8) {
                left = window.innerWidth - popupWidth - 8;
            }
            if (left < 8) left = 8;
            tableGridPopup.style.top = (rect.bottom + 4) + 'px';
            tableGridPopup.style.left = left + 'px';
            tableGridPopup.classList.add('open');
        });

        tableGridEl.addEventListener('mouseover', (e) => {
            const cell = e.target.closest('.table-grid-cell');
            if (!cell) return;
            updateTableGridHover(parseInt(cell.dataset.r), parseInt(cell.dataset.c));
        });

        tableGridEl.addEventListener('click', (e) => {
            const cell = e.target.closest('.table-grid-cell');
            if (!cell) return;
            const r = parseInt(cell.dataset.r) + 1;
            const c = parseInt(cell.dataset.c) + 1;
            tableGridPopup.classList.remove('open');
            insertTableAtCursor(r, c);
        });

        document.addEventListener('click', (e) => {
            if (!tableGridPopup.contains(e.target) && e.target !== tableBtn) {
                tableGridPopup.classList.remove('open');
            }
        });

        // ── State ──
        let allItems = [];
        let currentNoteId = null;
        let autoSaveTimeout = null;
        let expandedFolders = new Set();
        let isSwitchingNotes = false;
        let hasUnsavedChanges = false;

        // ── Sidebar toggle ──
        function toggleSidebarView() {
            document.getElementById('appMainWrapper').classList.toggle('sidebar-hidden');
        }

        // ── Sidebar resize ──
        (function() {
            const handle = document.getElementById('resizeHandle');
            const panel = document.querySelector('.left-panels');
            const wrapper = document.getElementById('appMainWrapper');
            let startX, startW;

            function onDown(e) {
                startX = e.clientX;
                startW = panel.getBoundingClientRect().width;
                handle.classList.add('active');
                wrapper.classList.add('resizing');
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                e.preventDefault();
            }

            function onMove(e) {
                const w = Math.min(500, Math.max(180, startW + (e.clientX - startX)));
                panel.style.width = w + 'px';
            }

            function onUp() {
                handle.classList.remove('active');
                wrapper.classList.remove('resizing');
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onUp);
            }

            handle.addEventListener('mousedown', onDown);
        })();

        // ── Theme (dark / light toggle) ──
        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light-theme');
            const isLight = html.classList.contains('light-theme');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            document.getElementById('themeToggleBtn').textContent = isLight ? 'Dark' : 'Light';
        }

        // Restore theme
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.classList.add('light-theme');
            document.getElementById('themeToggleBtn').textContent = 'Dark';
        } else {
            document.getElementById('themeToggleBtn').textContent = 'Light';
        }

        document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);

        // ── Search ──
        let searchTimeout = null;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(renderWorkspaceTree, 150);
        });

        // ── Fetch workspace ──
        async function fetchWorkspace() {
            const container = document.getElementById('treeRootContainer');
            container.innerHTML =
                '<div class="loading-skeleton">' +
                '<div class="loading-skeleton-line"></div>'.repeat(5) +
                '</div>';
            try {
                const response = await api('/api/notes');
                if (!response.ok) throw new Error('Failed to fetch notes');
                allItems = await response.json();
                renderWorkspaceTree();
            } catch (err) {
                console.error('Workspace fetch error:', err);
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">!</div><div class="empty-state-text">Failed to load notes. Check your connection.</div></div>';
                showToast('Failed to load notes', 'error');
            }
        }

        // ── Render tree ──
        function renderWorkspaceTree() {
            const container = document.getElementById('treeRootContainer');
            container.innerHTML = '';

            const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();
            let filteredItems = allItems;
            if (query) {
                filteredItems = allItems.filter(item =>
                    item.title.toLowerCase().includes(query) ||
                    (item.content && item.content.toLowerCase().includes(query))
                );
            }

            const roots = filteredItems.filter(item => !item.parent_id);

            if (roots.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">${query ? '~' : '<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAYAAAAeP4ixAAAACXBIWXMAAAsTAAALEwEAmpwYAAADdklEQVR4nO2ZXYhNURTHt68kEoXIR/IgvHggJmbuXveOYRIN6ax1xyglDVFelMLDeCAevHj1lQeRoeZBlBp3rXNvpElT3siL5COl8ZVMY3K1r9vImHPuOffufWfo/mu/ndbev7X2WmvvfZSqqaaxJ6/Tm5DyvTUgeFgzXdWCj0DoLTD2gVAehL5owRfA2KuZ7oBgR9JPp5ru7ZqqxoIaczuXaKazwPimuOB4g3EAhLogg5tGBUBz6yzNeLG4kLyNYaKoOb26ahBJwc2a8Z0tgD9haNBsO5XvGO8UAiR96Ndk9iH+AGK6sepx+yRHEHjANcCwcV3l1Ti7EBlqrEYk/o4MHrUGobllRqGUlq5AL0HoOAgeAaaMZrrU4NNCzd40yKTXFotDb+EbP31QM10Boe8lbA4k7+NKSyB4LoLnXmv25sa1DRncUdpBlKkYItXtzddC/UEVRjOdMF6vZA7wvd0gyCUcVVcRiGY8FTwBnla2lFfjQOh8CMyFiowXjhWBXmpdZg1EKVWf9WYD04+A7fXZ5FpZhhNCy0M8dM1F0yo2208jzpmhljKNenuCQDbkvEXKkcDHfQF5crIsg4VyGQCSynorlCM1Pdg1JwDkXlkGi0fxoES/rRypkCsyYk/pa77bPDm2QRB6HgSSkPR2JxS/dsLeEAd2xDco9D64YpVZQUIB2hYYiMBkl0Lv6jdFKJbh0OOD5YsQZHB9yQ4vQ1ssG+swCUIfQjrtJxsAZs8nfdpYPKdFAxHKJ4XaI0+iGZ+EGTNJGWfRmvVEYOqJs2AIHh8a/LZ5kSYGocthxjR7++OAmMcGSxD54uiM6EHaUsLQFwMT5dRb99CbAkwPLYPkE4JbS4KYq2ZY5RppjGSnMUtLtZDYhoBC4lOPtbtIEIjp/ib8Nl9aYPj2FvoYCcQklGb6Ghck6dM6EPzmCgCGBt6MBFKMypm4ICCUcw9BXeYaHhmk+VHb9Kh1/jeIw2gw9poKqMq9J8SMiLNIqErvQebRbEyA2DjUmd7xz4NESXzXIFpoUNmQueKGvThWAeSVsiUt2D2KW6vLGggIHRu1iDBuswaS9DExGiBasFvZlGZaXG0QLfTU/CWzCmJ+YFYTRAvdqs/tnGkVotRCKwJhfGNOs+bZRzM+M78lzO8IJwAuQZwuOEg1EKmBuNF/A1JTTSqyfgJ2ffNp2sklewAAAABJRU5ErkJggg==" alt="brain" class="empty-state-icon-img">'}</div>
                        <div class="empty-state-text">${query ? 'No results for "<strong>' + escapeHtml(query) + '</strong>"' : 'No notes yet.<br>Click <strong>+ Note</strong> or <strong>+ Folder</strong> to get started.'}</div>
                    </div>`;
                return;
            }

            roots.forEach((rootItem, idx) => {
                container.appendChild(createItemElement(rootItem, 0, idx));
            });
        }

        function createItemElement(item, depth, index) {
            const wrapper = document.createElement('div');

            const row = document.createElement('div');
            row.className = 'tree-item' + (item.id === currentNoteId ? ' active' : '');
            row.style.paddingLeft = ((depth * 16) + 12) + 'px';
            row.style.animationDelay = (index * 0.04) + 's';

            const icon = item.is_folder
                ? (expandedFolders.has(item.id)
                    ? '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1.5 5h4l1.5 2h6.5l-1.5 6h-10z" stroke="currentColor" stroke-width="1.5"/></svg>'
                    : '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1.5 4.5h4l1.5 2h7.5v7a1 1 0 01-1 1h-12a1 1 0 01-1-1v-8a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/></svg>')
                : '<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3.5 1.5h6l4 4v9a1 1 0 01-1 1h-9a1 1 0 01-1-1v-12a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5"/><path d="M9.5 1.5v4h4" stroke="currentColor" stroke-width="1.5"/></svg>';

            const preview = item.content ? getContentPreview(item.content) : '';

            row.innerHTML = `
                <div class="tree-item-content">
                    <span class="tree-item-icon">${icon}</span>
                    <div class="tree-item-text">
                        <span class="tree-item-title" data-id="${item.id}">${escapeHtml(item.title)}</span>
                        ${preview ? `<span class="tree-item-preview">${escapeHtml(preview)}</span>` : ''}
                    </div>
                </div>
                <div class="inline-actions">
                    ${item.is_folder ? `<button class="btn-inline" title="Add note inside" data-add-in="${item.id}">⊞</button>` : ''}
                    <button class="btn-inline" title="Delete" data-delete="${item.id}">✕</button>
                </div>
            `;

            row.querySelector('[data-add-in]')?.addEventListener('click', (e) => {
                e.stopPropagation();
                createNewItem(false, item.id);
            });

            row.querySelector('[data-delete]')?.addEventListener('click', (e) => {
                e.stopPropagation();
                deleteItem(item.id);
            });

            row.querySelector('.tree-item-title')?.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                if (item.is_folder) row.dataset.rename = '1';
                startRename(item.id, e.target);
            });

            row.onclick = (e) => {
                if (item.is_folder) {
                    if (row.dataset.rename === '1') {
                        delete row.dataset.rename;
                        return;
                    }
                    if (expandedFolders.has(item.id)) {
                        expandedFolders.delete(item.id);
                    } else {
                        expandedFolders.add(item.id);
                    }
                    renderWorkspaceTree();
                } else {
                    loadNoteIntoEditor(item.id);
                }
            };

            wrapper.appendChild(row);

            if (item.is_folder && expandedFolders.has(item.id)) {
                const subTree = document.createElement('div');
                subTree.className = 'sub-tree expanded';
                const children = allItems.filter(child => child.parent_id === item.id);
                children.forEach((child, childIdx) => {
                    subTree.appendChild(createItemElement(child, depth + 1, childIdx));
                });
                wrapper.appendChild(subTree);
            }

            return wrapper;
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function getContentPreview(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            let text = div.textContent.trim();
            text = text.split('\n')[0].slice(0, 80);
            return text.replace(/<[^>]*>/g, '').trim();
        }

        // ── Inline rename ──
        function startRename(id, titleEl) {
            const item = allItems.find(i => i.id === id);
            if (!item) return;

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'tree-item-title-edit';
            input.value = item.title;
            input.setAttribute('data-id', id);

            titleEl.replaceWith(input);
            input.focus();
            input.select();

            function finish(shouldSave) {
                if (shouldSave && input.value.trim()) {
                    const newTitle = input.value.trim();
                    if (newTitle !== item.title) {
                        item.title = newTitle;
                        api('/api/notes/' + id, {
                            method: 'PUT',
                            body: JSON.stringify({ title: newTitle })
                        }).catch(() => {});
                        if (currentNoteId === id) {
                            renderWorkspaceTree();
                        }
                    }
                }
                const span = document.createElement('span');
                span.className = 'tree-item-title';
                span.textContent = item.title;
                input.replaceWith(span);
                if (currentNoteId === id) {
                    renderWorkspaceTree();
                }
            }

            input.addEventListener('keydown', (e) => {
                e.stopPropagation();
                if (e.key === 'Enter') { input.blur(); }
                if (e.key === 'Escape') { finish(false); }
            });

            input.addEventListener('blur', () => finish(true));
        }

        // ── Create item ──
        document.getElementById('createFolderBtn').addEventListener('click', () => createNewItem(true));
        document.getElementById('createNoteBtn').addEventListener('click', () => createNewItem(false));

        async function createNewItem(isFolder, parentId = null) {
            const title = await openModal({
                title: isFolder ? 'New Folder' : 'New Note',
                label: 'Title',
                placeholder: isFolder ? 'Folder name' : 'Note title',
                confirmText: 'Create'
            });

            if (title === null) return;
            const safeTitle = title.trim() || (isFolder ? 'Untitled Folder' : 'Untitled Note');

            const payload = {
                title: safeTitle,
                content: isFolder ? '' : '<p><br></p>',
                is_folder: isFolder,
                parent_id: parentId
            };

            try {
                const response = await api('/api/notes', {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Failed to create');
                }

                if (parentId) expandedFolders.add(parentId);
                await fetchWorkspace();
                showToast(`${isFolder ? 'Folder' : 'Note'} created`, 'success');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ── Load note ──
        function loadNoteIntoEditor(id) {
            const note = allItems.find(item => item.id === id);
            if (!note || note.is_folder) return;

            if (hasUnsavedChanges) {
                if (!confirm('You have unsaved changes. Discard them?')) return;
            }

            if (autoSaveTimeout) {
                clearTimeout(autoSaveTimeout);
                autoSaveTimeout = null;
            }

            isSwitchingNotes = true;
            currentNoteId = note.id;
            hasUnsavedChanges = false;

            quill.root.innerHTML = note.content;
            const statusEl = document.getElementById('editorStatus');
            statusEl.textContent = 'Saved';
            statusEl.className = 'editor-status';

            renderWorkspaceTree();

            setTimeout(() => { isSwitchingNotes = false; }, 50);
        }

        // ── Save note ──
        async function saveCurrentNote() {
            const targetSaveId = currentNoteId;
            if (!targetSaveId) return;

            const activeItem = allItems.find(i => i.id === targetSaveId);
            if (!activeItem || activeItem.is_folder) return;

            const content = quill.root.innerHTML;

            if (activeItem.content === content) {
                document.getElementById('editorStatus').textContent = 'Saved';
                hasUnsavedChanges = false;
                return;
            }

            const statusEl = document.getElementById('editorStatus');
            statusEl.textContent = 'Saving...';
            statusEl.className = 'editor-status saving';

            try {
                const response = await api('/api/notes/' + targetSaveId, {
                    method: 'PUT',
                    body: JSON.stringify({ content })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Save failed');
                }

                statusEl.textContent = 'Saved';
                statusEl.className = 'editor-status';
                activeItem.content = content;
                hasUnsavedChanges = false;
                renderWorkspaceTree();
                showToast('Note saved', 'success');
            } catch (err) {
                document.getElementById('editorStatus').textContent = 'Save failed';
                document.getElementById('editorStatus').className = 'editor-status failed';
                showToast(err.message, 'error');
            }
        }

        document.getElementById('saveBtn').addEventListener('click', () => {
            if (autoSaveTimeout) {
                clearTimeout(autoSaveTimeout);
                autoSaveTimeout = null;
            }
            saveCurrentNote();
        });

        // ── Auto-save ──
        function triggerAutoSave() {
            if (isSwitchingNotes || !currentNoteId) return;

            const activeItem = allItems.find(i => i.id === currentNoteId);
            if (!activeItem || activeItem.is_folder) return;

            hasUnsavedChanges = true;
            const statusEl = document.getElementById('editorStatus');
            statusEl.textContent = 'Unsaved';
            statusEl.className = 'editor-status unsaved';
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(saveCurrentNote, 1000);
        }

        quill.on('text-change', triggerAutoSave);

        // ── Delete item ──
        async function deleteItem(id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            try {
                const response = await api('/api/notes/' + id, { method: 'DELETE' });

                if (!response.ok) {
                    const err = await response.json();
                    if (response.status === 409) {
                        showToast(err.error, 'error');
                        return;
                    }
                    throw new Error(err.error || 'Delete failed');
                }

                if (currentNoteId === id) {
                    currentNoteId = null;
                    hasUnsavedChanges = false;
                    quill.root.innerHTML = '';
                    document.getElementById('editorStatus').textContent = 'No note selected';
                }

                await fetchWorkspace();
                showToast('Deleted', 'success');
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        // ── Keyboard shortcuts ──
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (autoSaveTimeout) {
                    clearTimeout(autoSaveTimeout);
                    autoSaveTimeout = null;
                }
                saveCurrentNote();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                e.preventDefault();
                createNewItem(false);
            }
        });

        // ── Warn before closing with unsaved changes ──
        window.addEventListener('beforeunload', (e) => {
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        // ── Init (auth-gated) ──
        async function initApp() {
            const statusEl = document.getElementById('editorStatus');
            statusEl.textContent = 'No note selected';
            statusEl.className = 'editor-status';
            await fetchWorkspace();
        }

        document.getElementById('logoutBtn').addEventListener('click', handleLogout);

        // Start: check auth, then init
        (async function() {
            const authed = await checkAuth();
            if (authed) {
                initApp();
            }
        })();
    </script>
</body>
</html>
